services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mbolo
      POSTGRES_PASSWORD: mbolo_dev
      POSTGRES_DB: mbolo_sante
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
