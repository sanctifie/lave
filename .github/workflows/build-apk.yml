name: Build APK Android

on:
  # Déclenchement manuel depuis GitHub → Actions → "Run workflow"
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version (ex: 1.0.0-beta1)'
        required: false
        default: 'dev'

  # Déclenchement automatique sur push vers main
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/shared/**'

# Nécessaire pour que l'étape « Create GitHub Release » puisse publier
# (sinon le GITHUB_TOKEN est en lecture seule → 403 sur la création de release).
permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK (Android debug)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java 17 (requis par Gradle / Android) ─────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── pnpm ──────────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # ── Cache pnpm ────────────────────────────────────────────────────────
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      # ── Dépendances ───────────────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Le package partagé pointe vers ./dist : il doit être compilé avant que
      # Metro ne l'empaquette (sinon « Unable to resolve module @mbolo/shared »).
      - name: Build @mbolo/shared
        run: pnpm --filter @mbolo/shared build

      # ── Variables d'environnement mobile ──────────────────────────────────
      - name: Create mobile .env
        run: |
          cat > apps/mobile/.env << 'EOF'
          EXPO_PUBLIC_API_URL=${{ secrets.API_URL || 'https://api.mbolo.com' }}
          EXPO_PUBLIC_PROJECT_ID=${{ secrets.EXPO_PROJECT_ID || 'placeholder' }}
          EOF

      # ── Expo Prebuild → génère le projet Android natif ────────────────────
      - name: Expo Prebuild (Android)
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean --no-install
        env:
          # Expo ne demande pas de login pour le prebuild local
          EXPO_NO_TELEMETRY: 1

      # ── Cache Gradle ──────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── Build APK release ─────────────────────────────────────────────────
      # release (et non debug) : le bundle JS est EMBARQUÉ dans l'APK.
      # Un APK debug va chercher le JS sur un serveur Metro (localhost:8081)
      # → « Could not connect to development server » sur un vrai téléphone.
      # Le template Expo signe le release avec la clé debug par défaut : l'APK
      # est donc installable sans keystore dédié (usage test interne).
      - name: Build APK (release, JS embarqué)
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

      # ── Renommer l'APK avec la version ────────────────────────────────────
      - name: Rename APK
        run: |
          VERSION="${{ github.event.inputs.version_name || github.sha }}"
          SHORT="${VERSION:0:7}"
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk \
             mbolo-sante-${SHORT}.apk

      # ── Upload artefact GitHub (téléchargeable 30 jours) ──────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mbolo-sante-apk
          path: mbolo-sante-*.apk
          retention-days: 30

      # ── Créer une Release GitHub avec l'APK attaché ───────────────────────
      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version_name || github.run_number }}"
          name: "MBOLO Santé ${{ github.event.inputs.version_name || github.run_number }}"
          draft: false
          prerelease: true
          body: |
            ## APK Android — MBOLO Santé (test interne)

            APK **release** : le JavaScript est embarqué, l'app se lance **sans
            serveur de développement** (autonome).

            ### Installation
            1. Télécharger `mbolo-sante-*.apk` ci-dessous
            2. Sur votre Android : **Paramètres → Sécurité → Sources inconnues** → Activer
            3. Ouvrir l'APK téléchargé → Installer

            ### Prérequis
            - Android 8.0+ (API 26+)
            - L'app démarre sans réseau, mais la **connexion (OTP)** et les données
              nécessitent que l'API soit joignable à l'URL `EXPO_PUBLIC_API_URL`
              (secret `API_URL`, défaut `https://api.mbolo.com`).

            Signé avec la clé de debug (test interne — non destiné au Play Store).

            Commit : `${{ github.sha }}`
          files: mbolo-sante-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
