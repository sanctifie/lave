name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api-tests:
    name: API · tests unitaires
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Le package partagé doit être compilé avant que l'API ne le résolve
      - name: Build @mbolo/shared
        run: pnpm --filter @mbolo/shared build

      # Génère le client Prisma (requis pour le typage et les imports au chargement)
      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate

      - name: Typecheck API
        run: pnpm --filter api typecheck

      - name: Run API tests
        run: pnpm --filter api test

  web-build:
    name: Web · typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @mbolo/shared
        run: pnpm --filter @mbolo/shared build

      - name: Typecheck + build web
        run: pnpm --filter web build
