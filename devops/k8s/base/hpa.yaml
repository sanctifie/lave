# HorizontalPodAutoscaler : ajoute/retire des pods selon la charge CPU.
# C'est l'autoscaling APPLICATIF ; l'autoscaling des NŒUDS est géré par le
# node group EKS (ou Karpenter, l'étape d'après).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70   # au-delà de 70 % de la request CPU → scale out
